volumes:
  n8n_storage:
  postgres_n8n_storage:
  postgres_langflow_storage:
  postgres_langfuse_storage:
  ollama_storage:
  qdrant_storage:
  langflow-storage:
  flowise-storage:

networks:
  LocalRAG:
    name: LocalRAG
    external: true

x-n8n: &service-n8n
  image: n8nio/n8n:latest
  networks: ['LocalRAG']
  environment:
    - DB_TYPE=postgresdb
    - DB_POSTGRESDB_HOST=postgres_n8n
    - DB_POSTGRESDB_USER=root
    - DB_POSTGRESDB_PASSWORD=password
    - N8N_DIAGNOSTICS_ENABLED=false
    - N8N_PERSONALIZATION_ENABLED=false
    - N8N_ENCRYPTION_KEY=super-secret-key
    - N8N_USER_MANAGEMENT_JWT_SECRET=even-more-secret
  links:
    - postgres_n8n

x-ollama: &service-ollama
  image: ollama/ollama:latest
  container_name: ollama
  networks: ['LocalRAG']
  restart: unless-stopped
  ports:
    - 11434:11434
  volumes:
    - ollama_storage:/root/.ollama

x-init-ollama: &init-ollama
  image: ollama/ollama:latest
  networks: ['LocalRAG']
  container_name: ollama-pull-llama
  volumes:
    - ollama_storage:/root/.ollama
  entrypoint: /bin/sh
  command:
    - "-c"
    - "sleep 3;export OLLAMA_HOST=ollama:11434;ollama pull llama3.2:3b-instruct-q8_0;ollama pull qwen2.5:7b-instruct-q8_0"

services:
  postgres_n8n:
    image: postgres:16-alpine
    networks: ['LocalRAG']
    container_name: postgres_n8n
    restart: unless-stopped
    environment:
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=n8n
    volumes:
      - postgres_n8n_storage:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -U root -d n8n']
      interval: 5s
      timeout: 5s
      retries: 10
  
  postgres_langflow:
    image: postgres:16-alpine
    networks: ['LocalRAG']
    container_name: postgres_langflow
    restart: unless-stopped
    environment:
      - POSTGRES_USER=langflow
      - POSTGRES_PASSWORD=langflow
      - POSTGRES_DB=langflow
    volumes:
      - postgres_langflow_storage:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -U langflow -d langflow']
      interval: 5s
      timeout: 5s
      retries: 10

  n8n-import:
    <<: *service-n8n
    container_name: n8n-import
    entrypoint: /bin/sh
    command:
      - "-c"
      - "n8n import:credentials --separate --input=/backup/credentials && n8n import:workflow --separate --input=/backup/workflows"
    volumes:
      - ./n8n/backup:/backup
    depends_on:
      postgres_n8n:
        condition: service_healthy

  n8n:
    <<: *service-n8n
    container_name: n8n
    restart: unless-stopped
    ports:
      - 5678:5678
    volumes:
      - n8n_storage:/home/node/.n8n
      - ./n8n/backup:/backup
      - ./shared:/data/shared
    depends_on:
      postgres_n8n:
        condition: service_healthy
      n8n-import:
        condition: service_completed_successfully

  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    networks: ['LocalRAG']
    restart: unless-stopped
    ports:
      - 6333:6333
      - 6334:6334 
    volumes:
      - qdrant_storage:/qdrant/storage
  
  redis-stack:
    image: redis/redis-stack
    container_name: redis-stack
    networks: ['LocalRAG']
    restart: unless-stopped
    ports:
      - 6379:6379 
      - 8001:8001
  
  langflow:
    image: langflowai/langflow:latest # or another version tag on https://hub.docker.com/r/langflowai/langflow 
    pull_policy: always               # set to 'always' when using 'latest' image
    ports:
      - "7860:7860"
    depends_on:
      - postgres_langflow
    environment:
      - LANGFLOW_DATABASE_URL=postgresql://langflow:langflow@postgres_langflow:5432/langflow
      - LANGFLOW_LANGFUSE_SECRET_KEY=sk-lf-dcc609b8-1720-4f6d-bf7d-bdc5e3dc2605
      - LANGFLOW_LANGFUSE_PUBLIC_KEY=pk-lf-df330244-dba5-4201-affb-1deef764599e
      - LANGFLOW_LANGFUSE_HOST=http://langfuse-server:3000
      # This variable defines where the logs, file storage, monitor data and secret keys are stored.
    volumes:
      - langflow-storage:/app/langflow
    networks: ['LocalRAG']
    container_name: langflow
    command: langflow run --host 0.0.0.0
  
  langfuse-server:
    image: langfuse/langfuse:2
    container_name: langfuse-server
    networks: ['LocalRAG']
    restart: unless-stopped
    ports:
      - 4000:3000
    depends_on:
      postgres_langfuse:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://langfuse:langfuse@postgres_langfuse:5432/langfuse
      - SALT=mysalt
      - ENCRYPTION_KEY=e31a0f616083115c22c6d181ef82684d933f3eddda52e5429697dc608170d6b9 # generate via `openssl rand -hex 32`
      - NEXTAUTH_URL=http://localhost:4000
      - NEXTAUTH_SECRET=cacola
      - TELEMETRY_ENABLED=false
      - LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES=false
      - SALT="salt"
      - REDIS_HOST=redis-stack
      - REDIS_PORT=6379

  postgres_langfuse:
    image: postgres
    container_name: postgres_langfuse
    networks: ['LocalRAG']
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U langfuse -d langfuse"]
      interval: 3s
      timeout: 3s
      retries: 10
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=langfuse
      - POSTGRES_DB=langfuse
    volumes:
      - postgres_langfuse_storage:/var/lib/postgresql/data

  flowise:
      image: flowiseai/flowise
      container_name: flowise
      networks: ['LocalRAG']
      restart: unless-stopped
      environment:
          - PORT=${Flowise_Port}
          - CORS_ORIGINS=${CORS_ORIGINS}
          - IFRAME_ORIGINS=${IFRAME_ORIGINS}
          - FLOWISE_USERNAME=${FLOWISE_USERNAME}
          - FLOWISE_PASSWORD=${FLOWISE_PASSWORD}
          - FLOWISE_FILE_SIZE_LIMIT=${FLOWISE_FILE_SIZE_LIMIT}
          - DEBUG=${DEBUG}
          - DATABASE_PATH=${Flowise_DATABASE_PATH}
          - DATABASE_TYPE=${DATABASE_TYPE}
          - DATABASE_PORT=${DATABASE_PORT}
          - DATABASE_HOST=${DATABASE_HOST}
          - DATABASE_NAME=${DATABASE_NAME}
          - DATABASE_USER=${DATABASE_USER}
          - DATABASE_PASSWORD=${DATABASE_PASSWORD}
          - DATABASE_SSL=${DATABASE_SSL}
          - DATABASE_SSL_KEY_BASE64=${DATABASE_SSL_KEY_BASE64}
          - APIKEY_PATH=${Flowise_APIKEY_PATH}
          - SECRETKEY_PATH=${Flowise_SECRETKEY_PATH}
          - FLOWISE_SECRETKEY_OVERWRITE=${FLOWISE_SECRETKEY_OVERWRITE}
          - LOG_LEVEL=${LOG_LEVEL}
          - LOG_PATH=${Flowise_LOG_PATH}
          - BLOB_STORAGE_PATH=${Flowise_BLOB_STORAGE_PATH}
          - DISABLE_FLOWISE_TELEMETRY=${DISABLE_FLOWISE_TELEMETRY}
          - MODEL_LIST_CONFIG_JSON=${MODEL_LIST_CONFIG_JSON}
      ports:
          - '${Flowise_Port}:${Flowise_Port}'
      volumes:
          - flowise-storage:/root/.flowise
      entrypoint: /bin/sh -c "sleep 3; flowise start"


  ollama-cpu:
    profiles: ["cpu"]
    <<: *service-ollama

  ollama-gpu:
    profiles: ["gpu-nvidia"]
    <<: *service-ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  ollama-pull-llama-cpu:
    profiles: ["cpu"]
    <<: *init-ollama
    depends_on:
      - ollama-cpu

  ollama-pull-llama-gpu:
    profiles: ["gpu-nvidia"]
    <<: *init-ollama
    depends_on:
      - ollama-gpu
